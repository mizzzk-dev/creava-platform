name: Deploy Backend (Strapi)

on:
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'デプロイ先を選択'
        required: true
        default: 'strapi_cloud'
        type: choice
        options:
          - strapi_cloud
          - vps_ssh
      target_env:
        description: '対象環境（staging / production）'
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

env:
  NODE_VERSION: '20'
  WORKING_DIR: backend

jobs:
  deploy-strapi-cloud:
    name: Deploy → Strapi Cloud (${{ inputs.target_env }})
    runs-on: ubuntu-latest
    if: inputs.deploy_target == 'strapi_cloud'
    environment: ${{ inputs.target_env }}
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build admin panel
        run: npm run build
        env:
          NODE_ENV: production

      - name: Check deploy token
        run: |
          if [ -z "$STRAPI_DEPLOY_TOKEN" ]; then
            echo "::error::STRAPI_DEPLOY_TOKEN が未設定です。"
            echo "::error::GitHub Environments(${{ inputs.target_env }}) の Secrets を確認してください。"
            exit 1
          fi
        env:
          STRAPI_DEPLOY_TOKEN: ${{ secrets.STRAPI_DEPLOY_TOKEN }}

      - name: Deploy to Strapi Cloud
        run: npm run deploy -- --force --env "${{ inputs.target_env }}"
        env:
          STRAPI_DEPLOY_TOKEN: ${{ secrets.STRAPI_DEPLOY_TOKEN }}

  deploy-vps:
    name: Deploy → VPS (SSH / ${{ inputs.target_env }})
    runs-on: ubuntu-latest
    if: inputs.deploy_target == 'vps_ssh'
    environment: ${{ inputs.target_env }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            cd ${{ secrets.VPS_APP_DIR }}

            echo "=== git pull ==="
            git pull origin main

            echo "=== install dependencies ==="
            cd backend
            npm ci --omit=dev

            echo "=== build admin panel ==="
            NODE_ENV=production npm run build

            echo "=== restart with PM2 ==="
            pm2 reload strapi --update-env || pm2 start npm --name strapi -- run start

            echo "=== wait for health check ==="
            sleep 5
            curl -sf http://localhost:1337/_health || (echo "Health check failed" && exit 1)

            echo "=== deploy done ==="

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  pr-metadata:
    name: PR Metadata
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: PRメタデータをJSONに保存
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        run: |
          cat <<EOF > pr-metadata.json
          {
            "number": "${PR_NUMBER}",
            "title": ${PR_TITLE@Q},
            "url": "${PR_URL}",
            "author": "${PR_AUTHOR}",
            "base_ref": "${PR_BASE_REF}",
            "head_ref": "${PR_HEAD_REF}",
            "labels": "${PR_LABELS}",
            "sha": "${{ github.sha }}",
            "run_id": "${{ github.run_id }}"
          }
          EOF

      - name: サマリーにPR情報を出力
        run: |
          {
            echo "## Pull Request Metadata"
            echo "- Number: #${{ github.event.pull_request.number }}"
            echo "- Title: ${{ github.event.pull_request.title }}"
            echo "- URL: ${{ github.event.pull_request.html_url }}"
            echo "- Author: @${{ github.event.pull_request.user.login }}"
            echo "- Base / Head: \`${{ github.event.pull_request.base.ref }}\` ← \`${{ github.event.pull_request.head.ref }}\`"
            echo "- Labels: ${{ join(github.event.pull_request.labels.*.name, ', ') || '(none)' }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: PRメタデータをartifactに保存
        uses: actions/upload-artifact@v4
        with:
          name: pr-metadata
          path: pr-metadata.json
          if-no-files-found: error

  build:
    name: Type check & Build
    runs-on: ubuntu-latest
    needs: [pr-metadata]
    if: always() && (needs.pr-metadata.result == 'success' || needs.pr-metadata.result == 'skipped')
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test

      - name: Lint
        run: npm run lint

      - name: Build (production)
        run: npm run build:prod
        env:
          VITE_SITE_URL: ${{ secrets.VITE_SITE_URL }}
          VITE_STRAPI_API_URL: ${{ secrets.VITE_STRAPI_API_URL }}
          VITE_STRAPI_API_TOKEN: ${{ secrets.VITE_STRAPI_API_TOKEN }}
          VITE_LOGTO_ENDPOINT: ${{ secrets.VITE_LOGTO_ENDPOINT }}
          VITE_LOGTO_APP_ID_MAIN: ${{ secrets.VITE_LOGTO_APP_ID_MAIN }}
          VITE_LOGTO_APP_ID_STORE: ${{ secrets.VITE_LOGTO_APP_ID_STORE }}
          VITE_LOGTO_APP_ID_FC: ${{ secrets.VITE_LOGTO_APP_ID_FC }}
          VITE_LOGTO_APP_ID: ${{ secrets.VITE_LOGTO_APP_ID }}
          VITE_LOGTO_CALLBACK_PATH: /callback
          VITE_LOGTO_POST_LOGOUT_REDIRECT_URI: ${{ secrets.VITE_SITE_URL }}
          VITE_LOGTO_API_RESOURCE: ${{ secrets.VITE_LOGTO_API_RESOURCE }}
          VITE_LOGTO_ISSUER: ${{ secrets.VITE_LOGTO_ISSUER }}
          VITE_LOGTO_MANAGEMENT_API_ENDPOINT: ${{ secrets.VITE_LOGTO_MANAGEMENT_API_ENDPOINT }}
          VITE_SHOPIFY_STORE_DOMAIN: ${{ secrets.VITE_SHOPIFY_STORE_DOMAIN }}
          VITE_SHOPIFY_STOREFRONT_TOKEN: ${{ secrets.VITE_SHOPIFY_STOREFRONT_TOKEN }}
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}

  backend-build:
    name: Backend Build
    runs-on: ubuntu-latest
    needs: [pr-metadata]
    if: always() && (needs.pr-metadata.result == 'success' || needs.pr-metadata.result == 'skipped')
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build backend
        run: npm run build

name: Deploy Frontend (main / store / fanclub)

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build & Deploy (${{ matrix.site }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - site: main
            site_url: https://mizzz.jp
          - site: store
            site_url: https://store.mizzz.jp
          - site: fanclub
            site_url: https://fc.mizzz.jp

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prepare sitemap for target site
        run: cp ./public/sitemaps/sitemap-${{ matrix.site }}.xml ./public/sitemap.xml

      - name: Build (production)
        run: npm run build:prod
        env:
          VITE_SITE_TYPE: ${{ matrix.site }}
          VITE_SITE_URL: ${{ matrix.site_url }}
          VITE_MAIN_SITE_URL: https://mizzz.jp
          VITE_STORE_SITE_URL: https://store.mizzz.jp
          VITE_FANCLUB_SITE_URL: https://fc.mizzz.jp
          VITE_STRAPI_API_URL: ${{ secrets.VITE_STRAPI_API_URL }}
          VITE_STRAPI_API_TOKEN: ${{ secrets.VITE_STRAPI_API_TOKEN }}
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          VITE_SHOPIFY_STORE_DOMAIN: ${{ secrets.VITE_SHOPIFY_STORE_DOMAIN }}
          VITE_SHOPIFY_STOREFRONT_TOKEN: ${{ secrets.VITE_SHOPIFY_STOREFRONT_TOKEN }}
          VITE_FORMSPREE_CONTACT_ID: ${{ secrets.VITE_FORMSPREE_CONTACT_ID }}
          VITE_FORMSPREE_REQUEST_ID: ${{ secrets.VITE_FORMSPREE_REQUEST_ID }}
          VITE_SNS_X_URL: ${{ vars.VITE_SNS_X_URL }}
          VITE_SNS_INSTAGRAM_URL: ${{ vars.VITE_SNS_INSTAGRAM_URL }}
          VITE_SNS_NOTE_URL: ${{ vars.VITE_SNS_NOTE_URL }}
          VITE_SNS_YOUTUBE_URL: ${{ vars.VITE_SNS_YOUTUBE_URL }}

      - name: Resolve FTP server directory
        run: |
          SERVER_DIR="${{ matrix.site == 'main' && secrets.FTP_SERVER_DIR_MAIN || matrix.site == 'store' && secrets.FTP_SERVER_DIR_STORE || secrets.FTP_SERVER_DIR_FC }}"
          if [[ "$SERVER_DIR" != */ ]]; then
            SERVER_DIR="${SERVER_DIR}/"
          fi
          echo "FTP_SERVER_DIR=${SERVER_DIR}" >> "$GITHUB_ENV"

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ matrix.site == 'main' && secrets.FTP_SERVER_MAIN || matrix.site == 'store' && secrets.FTP_SERVER_STORE || secrets.FTP_SERVER_FC }}
          username: ${{ matrix.site == 'main' && secrets.FTP_USERNAME_MAIN || matrix.site == 'store' && secrets.FTP_USERNAME_STORE || secrets.FTP_USERNAME_FC }}
          password: ${{ matrix.site == 'main' && secrets.FTP_PASSWORD_MAIN || matrix.site == 'store' && secrets.FTP_PASSWORD_STORE || secrets.FTP_PASSWORD_FC }}
          local-dir: ./frontend/dist/
          server-dir: ${{ env.FTP_SERVER_DIR }}
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**

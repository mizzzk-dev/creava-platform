name: Deploy Frontend (main / store / fanclub)

on:
  push:
    branches: [main, staging]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      target_env:
        description: 'デプロイ環境（staging / production）'
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

jobs:
  resolve-environment:
    runs-on: ubuntu-latest
    outputs:
      target_env: ${{ steps.env.outputs.target_env }}
    steps:
      - id: env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "target_env=${{ github.event.inputs.target_env }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref_name }}" = "main" ]; then
            echo "target_env=production" >> "$GITHUB_OUTPUT"
          else
            echo "target_env=staging" >> "$GITHUB_OUTPUT"
          fi

  build-and-deploy:
    name: Build & Deploy (${{ matrix.site }} / ${{ needs.resolve-environment.outputs.target_env }})
    runs-on: ubuntu-latest
    needs: resolve-environment
    environment: ${{ needs.resolve-environment.outputs.target_env }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - site: main
            site_url_staging: https://stg.mizzz.jp
            site_url_production: https://mizzz.jp
          - site: store
            site_url_staging: https://store-stg.mizzz.jp
            site_url_production: https://store.mizzz.jp
          - site: fanclub
            site_url_staging: https://fc-stg.mizzz.jp
            site_url_production: https://fc.mizzz.jp

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prepare sitemap for target site
        run: cp ./public/sitemaps/sitemap-${{ matrix.site }}.xml ./public/sitemap.xml

      - name: Resolve site url
        run: |
          if [ "${{ needs.resolve-environment.outputs.target_env }}" = "production" ]; then
            echo "SITE_URL=${{ matrix.site_url_production }}" >> "$GITHUB_ENV"
            echo "MAIN_SITE_URL=https://mizzz.jp" >> "$GITHUB_ENV"
            echo "STORE_SITE_URL=https://store.mizzz.jp" >> "$GITHUB_ENV"
            echo "FANCLUB_SITE_URL=https://fc.mizzz.jp" >> "$GITHUB_ENV"
          else
            echo "SITE_URL=${{ matrix.site_url_staging }}" >> "$GITHUB_ENV"
            echo "MAIN_SITE_URL=https://stg.mizzz.jp" >> "$GITHUB_ENV"
            echo "STORE_SITE_URL=https://store-stg.mizzz.jp" >> "$GITHUB_ENV"
            echo "FANCLUB_SITE_URL=https://fc-stg.mizzz.jp" >> "$GITHUB_ENV"
          fi

      - name: Build
        run: npm run build:prod
        env:
          VITE_SITE_TYPE: ${{ matrix.site }}
          VITE_SITE_URL: ${{ env.SITE_URL }}
          VITE_MAIN_SITE_URL: ${{ env.MAIN_SITE_URL }}
          VITE_STORE_SITE_URL: ${{ env.STORE_SITE_URL }}
          VITE_FANCLUB_SITE_URL: ${{ env.FANCLUB_SITE_URL }}
          VITE_STRAPI_API_URL: ${{ secrets.VITE_STRAPI_API_URL }}
          VITE_STRAPI_API_TOKEN: ${{ secrets.VITE_STRAPI_API_TOKEN }}
          VITE_LOGTO_ENDPOINT: ${{ secrets.VITE_LOGTO_ENDPOINT }}
          VITE_LOGTO_APP_ID: ${{ secrets.VITE_LOGTO_APP_ID }}
          VITE_LOGTO_CALLBACK_PATH: /callback
          VITE_LOGTO_POST_LOGOUT_REDIRECT_URI: ${{ env.SITE_URL }}
          VITE_LOGTO_API_RESOURCE: ${{ secrets.VITE_LOGTO_API_RESOURCE }}
          VITE_SHOPIFY_STORE_DOMAIN: ${{ secrets.VITE_SHOPIFY_STORE_DOMAIN }}
          VITE_SHOPIFY_STOREFRONT_TOKEN: ${{ secrets.VITE_SHOPIFY_STOREFRONT_TOKEN }}
          VITE_FORMSPREE_CONTACT_ID: ${{ secrets.VITE_FORMSPREE_CONTACT_ID }}
          VITE_FORMSPREE_REQUEST_ID: ${{ secrets.VITE_FORMSPREE_REQUEST_ID }}
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}
          VITE_SNS_X_URL: ${{ vars.VITE_SNS_X_URL }}
          VITE_SNS_INSTAGRAM_URL: ${{ vars.VITE_SNS_INSTAGRAM_URL }}
          VITE_SNS_NOTE_URL: ${{ vars.VITE_SNS_NOTE_URL }}
          VITE_SNS_YOUTUBE_URL: ${{ vars.VITE_SNS_YOUTUBE_URL }}

      - name: Resolve FTP server directory
        run: |
          SERVER_DIR="${{ matrix.site == 'main' && secrets.FTP_SERVER_DIR_MAIN || matrix.site == 'store' && secrets.FTP_SERVER_DIR_STORE || secrets.FTP_SERVER_DIR_FC }}"
          if [[ "$SERVER_DIR" != */ ]]; then
            SERVER_DIR="${SERVER_DIR}/"
          fi
          echo "FTP_SERVER_DIR=${SERVER_DIR}" >> "$GITHUB_ENV"

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ matrix.site == 'main' && secrets.FTP_SERVER_MAIN || matrix.site == 'store' && secrets.FTP_SERVER_STORE || secrets.FTP_SERVER_FC }}
          username: ${{ matrix.site == 'main' && secrets.FTP_USERNAME_MAIN || matrix.site == 'store' && secrets.FTP_USERNAME_STORE || secrets.FTP_USERNAME_FC }}
          password: ${{ matrix.site == 'main' && secrets.FTP_PASSWORD_MAIN || matrix.site == 'store' && secrets.FTP_PASSWORD_STORE || secrets.FTP_PASSWORD_FC }}
          local-dir: ./frontend/dist/
          server-dir: ${{ env.FTP_SERVER_DIR }}
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
